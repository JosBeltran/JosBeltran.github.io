<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

<body>

<main class="artwork-page">
  <a href="../index.html" class="back-link">← Volver al catálogo</a>

  <section class="artwork-layout">
    <div class="artwork-image-wrap">
      <img src="../assets/artworks/JBU-026.JPG" alt="Cosmic Interference" class="artwork-image" />
    </div>

    <aside class="artwork-details">
      <img src="../assets/logo.png" class="detail-logo" alt="JBU Logo" />

      <p class="artwork-code">JBU-026</p>
      <h1>Cosmic Interference</h1>

      <div class="meta">
        <p><strong>Año:</strong> 2026</p>
        <p><strong>Técnica:</strong> Técnica mixta sobre papel</p>
        <p><strong>Medida:</strong> Por definir</p>
      </div>

      <p class="description">Obra original de Josue Beltran Uresti perteneciente a una serie inspirada en la física cuántica, la memoria y la percepción.</p>

      <div class="qr-box">
        <img src="../assets/qr/JBU-026.png" alt="QR JBU-026" />
        <p>Escanea para abrir esta obra</p>
      </div>

      <a class="whatsapp-btn"
         target="_blank"
         href="https://wa.me/528123518298?text=Hola%2C%20me%20interesa%20la%20obra%20JBU-026%20-%20Cosmic%20Interference">
        Preguntar por WhatsApp
      </a>
    </aside>
  </section>
</main>

<script>
  const likeBtn = document.querySelector(".like-btn");
  const code = likeBtn.dataset.code;
  const key = "likes-" + code;
  const span = likeBtn.querySelector("span");

  let likes = Number(localStorage.getItem(key) || 0);
  span.textContent = likes;

  likeBtn.addEventListener("click", () => {
    likes++;
    localStorage.setItem(key, likes);
    span.textContent = likes;
  });
</script>

</body>
